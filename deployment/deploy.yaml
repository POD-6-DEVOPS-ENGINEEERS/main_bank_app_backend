apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-backend-deployment
spec:
  replicas: 1  # Adjust as necessary
  selector:
    matchLabels:
      app: bank-backend
  template:
    metadata:
      labels:
        app: bank-backend
    spec:
      containers:
      - name: bank-backend-container
        image: supportcloud160/bank-app-backend:b219162  # Replace this with your Docker image name
        ports:
        - containerPort: 8080  # Replace with your app's port if necessary
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: bank-backend-config
              key: SPRING_DATASOURCE_URL
        - name: SPRING_DATASOURCE_PORT
          valueFrom:
            configMapKeyRef:
              name: bank-backend-config
              key: SPRING_DATASOURCE_PORT
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            configMapKeyRef:
              name: bank-backend-config
              key: SPRING_DATASOURCE_USERNAME
              
        # - name: DB_USERNAME
        #   valueFrom:
        #     secretKeyRef:
        #       name: bank-backend-secret
        #       key: DB_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bank-backend-secret
              key: SPRING_DATASOURCE_PASSWORD



              




